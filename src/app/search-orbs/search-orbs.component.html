<h5 class="text-md-center m-5">Search Resources</h5>

<div class="m-5 d-grid gap-3">
    
    <div class="row">

        <div class="col">
            <div class="form-floating">
                <select #state placeholder="State" class="form-select" (change)="onStateChange(state.value)">
                    <option *ngFor="let state of stateList">
                        {{state}}
                    </option>
                </select> 
                <label class="text-primary form-label">State</label>
            </div>
        </div>

        <div class="col">
            <div class="form-floating">
                <select #county placeholder="County" class="form-select">
                    <option *ngFor="let county of countyList">
                        {{county}}
                    </option>
                </select>
                <label class="text-primary form-label">County</label>
            </div>
        </div>

        <div class="col">
            <div class="form-floating">
                <button type="button" class="btn btn-primary btn-lg" (click)="onSearchClicked(county.value)">Search</button>
            </div>
        </div>

    </div>

 
</div>

<h5 class="text-md-center m-5">Searchable Indexes</h5>
<div class="m-5 d-grid gap-3">
    <div class="row">
        <div class="col">
            Land Index
        </div>
        <div class="col">
            <div *ngIf="selectedOrb[0] != undefined">
                <a href="{{selectedOrb[0].landUrl}}" target="_blank">Goto Website</a>
            </div>
        </div>
    </div>
    
    <div class="row">
        <div class="col">
            Tax Assessor
        </div>
        <div class="col">
            <div *ngIf="selectedOrb[0] != undefined">
                <a href="{{selectedOrb[0].assessorUrl}}" target="_blank">Goto Website</a>
            </div>
        </div>
    </div>
</div>
